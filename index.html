<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lala & Gary</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: #f8f5f0;
    color: #2f2f2f;
}

.hero {
    height: 100vh;
    background-image: url("images/watercolor1.png");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 20, 20, 0.45);
}

.content {
    position: relative;
    text-align: center;
    color: white;
    max-width: 700px;
    padding: 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    margin: 0;
    letter-spacing: 1px;
    font-weight: 500;
}

/* DECOR LINE */
.line {
    width: 70px;
    height: 1px;
    background: white;
    margin: 20px auto;
    opacity: 0.7;
}

.date {
    margin-top: 10px;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.9;
}

.location {
    margin-top: 5px;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.8;
}

.welcome {
    margin-top: 40px;
    font-size: 18px;
    font-style: italic;
    opacity: 0.9;
}

.buttons {
    margin-top: 30px;
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border: 1px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
    font-size: 16px;
    letter-spacing: 1px;
    border-radius: 30px;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
    font-weight: 500;
}

.btn:hover {
    background: white;
    color: #2f2f2f;
    transform: translateY(-2px);
}

.flag {
    font-size: 24px;
    display: inline-block;
}
</style>
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="content">
        <h1>Lala & Gary</h1>
        <div class="line"></div>

        <div class="date">30 April 2027</div>
        <div class="location">Boadilla del Monte · Madrid, Spain</div>


        <div class="buttons">
            <a class="btn" href="espanol.html"><span class="flag">🇪🇸</span> Español</a>
            <a class="btn" href="english.html"><span class="flag">🇺🇸</span> English</a>
        </div>
    </div>
</div>

</body>
</html>
