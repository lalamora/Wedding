<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lala & Gary</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

body {
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

/* HERO BACKGROUND */
.hero {
    position: relative;
    height: 100vh;
    background-image: url("images/watercolor1.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SOFT OVERLAY (kept very light to preserve artwork) */
.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        rgba(20,18,15,0.10),
        rgba(20,18,15,0.18)
    );
}

/* ELEGANT PAPER CARD */
.card {
    position: relative;
    z-index: 2;
    background: rgba(250, 245, 235, 0.85); /* ivory paper */
    padding: 50px 60px;
    border-radius: 14px;
    text-align: center;
    max-width: 700px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    backdrop-filter: blur(2px);
}

/* TITLE */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 76px;
    font-weight: 500;
    margin: 0;
    letter-spacing: 1px;
    color: #2b2622;
}

/* DECOR LINE */
.line {
    width: 70px;
    height: 1px;
    background: #2b2622;
    margin: 25px auto;
    opacity: 0.6;
}

/* DATE */
.date {
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #2b2622;
}

/* LOCATION */
.location {
    margin-top: 10px;
    letter-spacing: 2px;
    font-size: 14px;
    color: #2b2622;
    opacity: 0.9;
}

/* WELCOME TEXT (warmer + simpler) */
.welcome {
    margin-top: 45px;
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-style: italic;
    color: #2b2622;
}

.subtitle {
    margin-top: 10px;
    font-size: 16px;
    color: #2b2622;
    opacity: 0.85;
}

/* LANGUAGE LINKS */
.languages {
    margin-top: 55px;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.languages a {
    color: #2b2622;
    text-decoration: none;
    font-size: 16px;
    letter-spacing: 2px;
    transition: 0.3s;
}

.languages a:hover {
    opacity: 0.6;
}

/* RESPONSIVE */
@media (max-width: 700px) {

    .card {
        padding: 35px 25px;
        margin: 20px;
    }

    h1 {
        font-size: 52px;
    }

    .welcome {
        font-size: 24px;
    }

    .languages {
        flex-direction: column;
        gap: 15px;
    }
}

</style>
</head>

<body>

<div class="hero">

    <div class="overlay"></div>

    <!-- PAPER CARD OVERLAY -->
    <div class="card">

        <h1>Lala & Gary</h1>

        <div class="line"></div>

        <div class="date">30 April 2027</div>

        <div class="location">BOADILLA DEL MONTE · MADRID</div>

        <div class="welcome">We're so happy you're here.</div>

        <div class="subtitle"></div>

        <div class="languages">
            <a href="english.html">🇺🇸 English</a>
            <a href="espanol.html">🇪🇸 Español</a>
        </div>

    </div>

</div>

</body>
</html>
